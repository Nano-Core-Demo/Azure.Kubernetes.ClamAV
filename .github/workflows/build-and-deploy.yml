name: Build and Deploy
on:
  push
env:
  APP_NAME: clamav
  VERSION: '${{ vars.VERSION }}.${{ github.run_number }}.${{ github.run_attempt }}'
  CHART_VERSION: 3.7.1
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }} 
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }} 
  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }} 
  AZURE_GROUP: ${{ vars.AZURE_KUBERNETES_RESOURCE_GROUP }} 
  AZURE_SUBSCRIPTION_ID: ${{ github.ref == 'refs/heads/master' && secrets.PRODUCTION_AZURE_SUBSCRIPTION_ID || secrets.STAGING_AZURE_SUBSCRIPTION_ID }}
  KUBERNETES_CLUSTER: ${{ github.ref == 'refs/heads/master' && vars.PRODUCTION_KUBERNETES_CLUSTER || vars.STAGING_KUBERNETES_CLUSTER }}
  KUBERNETES_NODEPOOL_COMPUTE: cpu
  KUBERNETES_NAMESPACE: apps
  KUBERNETES_REPLICA_COUNT: ${{ github.ref == 'refs/heads/master' && 3 || 2 }}  
  KUBERNETES_MEMORY_REQUEST: 256Mi
  KUBERNETES_MEMORY_LIMIT: 768Mi
  KUBERNETES_CPU_REQUEST: 150m
  KUBERNETES_CPU_LIMIT: 450m
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    concurrency:
      group: ${{ github.repository }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6

      - name: Azure Login
        shell: pwsh
        run: |
          az login --service-principal -u $env:AZURE_CLIENT_ID -p $env:AZURE_CLIENT_SECRET --tenant $env:AZURE_TENANT_ID -o none;
          az account set -s $env:AZURE_SUBSCRIPTION_ID -o none;
          az aks get-credentials -g $env:AZURE_GROUP -n $env:KUBERNETES_CLUSTER -o none;

      - name: Deploy ClamAV
        shell: pwsh
        run: |
          $helmArgs = @(
              "--namespace", $env:KUBERNETES_NAMESPACE,
              "--version", $env:CHART_VERSION,
              "--set", "nodeSelector.kubernetes\.io\/os=linux",
              "--set", "nodeSelector.nodepool\.compute=$env:KUBERNETES_NODEPOOL_COMPUTE",
              "--set", "installCRDs=true"
              "--set", "replicaCount=$env:KUBERNETES_REPLICA_COUNT",
              "--set", "hpa.enabled=false",
              "--set", "resources.requests.cpu=$env:KUBERNETES_CPU_REQUEST",
              "--set", "resources.requests.memory=$env:KUBERNETES_MEMORY_REQUEST",
              "--set", "resources.limits.cpu=$env:KUBERNETES_CPU_LIMIT",
              "--set", "resources.limits.memory=$env:KUBERNETES_MEMORY_LIMIT"
          )

          $helmCommand = @(
              "set -euo pipefail"
              "helm repo add wiremind https://wiremind.github.io/wiremind-helm-charts || exit 1"
              "helm upgrade --install $env:APP_NAME wiremind/clamav " + ($helmArgs -join " ") + " || exit 2"
          ) -join "; "

          $result = az aks command invoke `
              -g $env:AZURE_GROUP `
              -n $env:KUBERNETES_CLUSTER `
              --command $helmCommand `
              --output json | ConvertFrom-Json;

          echo $result

          if ($result.exitCode -ne 0)
          {
              throw "Deploy failed"
          }

      - name: GitHub Release
        if: github.ref == 'refs/heads/master'
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ env.VERSION }}
          name: "Release ${{ env.VERSION }}"
          body: |
            Version: ${{ env.VERSION }}
            Commit: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
